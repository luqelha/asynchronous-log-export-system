services:
  worker:
    build:
      context: ./worker
    container_name: worker-service

    depends_on:
      - rabbitmq
      - redis

    volumes:
      - ./storage:/app/storage

    restart: unless-stopped

  api:
    build:
      context: ./api
    container_name: api-gateway

    ports:
      - '3000:3000'

    depends_on:
      - rabbitmq
      - redis

    volumes:
      - ./storage:/app/storage

    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq

    ports:
      - '5672:5672'
      - '8080:15672'

    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin

    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: redis

    ports:
      - '6379:6379'

    restart: unless-stopped

volumes:
  rabbitmq_data:
